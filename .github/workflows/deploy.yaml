name: Integracion Continua (CI)
#-----------------------
on:
  push:
    branches: ["main", "master"]
jobs:
  testeo:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: proyecto_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: proyecto_3
    env:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,*"
      DB_NAME: proyecto_test
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: 3307
    steps:
      - name: Obtener el código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcairo2-dev \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info
      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django
      - name: Ejecutar pruebas con pytest
        run: |
          pytest app/tests.py usuarios/tests.py --ds=config.settings